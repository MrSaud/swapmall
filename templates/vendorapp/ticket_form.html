{% extends "base_vendor.html" %}
{% load secure_ids %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="card">
  <h3>{{ title }}</h3>
  <form method="post">
    {% csrf_token %}
    {% if selected_vendor %}
    <input type="hidden" name="selected_vendor_id" value="{{ selected_vendor.id|encid }}">
    {% endif %}
    {{ form.as_p }}
    <button class="btn" type="submit">Save Ticket</button>
  </form>
</section>
{% endblock %}
