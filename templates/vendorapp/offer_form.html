{% extends "base_vendor.html" %}
{% load secure_ids %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="card">
  <h3>{{ title }}</h3>
  <form method="post">
    {% csrf_token %}
    {% if selected_vendor %}
    <input type="hidden" name="selected_vendor_id" value="{{ selected_vendor.id|encid }}">
    {% endif %}
    <p>
      <label for="productSearch"><strong>Search products (name or SKU)</strong></label>
      <input id="productSearch" type="text" placeholder="Type product name or SKU..." style="margin-top:6px;">
    </p>
    {{ form.as_p }}
    <button class="btn" type="submit">Save Offer</button>
  </form>
</section>
<script>
(function () {
  const searchInput = document.getElementById("productSearch");
  const select = document.getElementById("id_products");
  if (!searchInput || !select) return;
  searchInput.addEventListener("input", function () {
    const q = this.value.trim().toLowerCase();
    Array.from(select.options).forEach((opt) => {
      const txt = (opt.text || "").toLowerCase();
      opt.hidden = q && !txt.includes(q);
    });
  });
})();
</script>
{% endblock %}
