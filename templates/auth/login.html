<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Login</title>
  <style>
    :root {
      --bg: #f6f9f7;
      --card: #ffffff;
      --text: #13231f;
      --primary: #1b4d3e;
      --accent: #f4a259;
      --muted: #5a6c66;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #e6f0ec, var(--bg));
      display: grid;
      place-items: center;
      color: var(--text);
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(17, 37, 31, 0.1);
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    p { margin: 0 0 20px; color: var(--muted); }
    label { display: block; font-weight: 600; margin: 12px 0 6px; }
    input {
      width: 100%;
      border: 1px solid #d7e2de;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 1rem;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      margin-top: 16px;
      font-weight: 700;
      font-size: 1rem;
      background: var(--primary);
      color: #fff;
    }
    .errorlist { color: #b42318; padding-left: 16px; margin: 8px 0; }
    .hint { margin-top: 14px; font-size: 0.9rem; color: var(--muted); }
    @media (max-width: 480px) {
      .card { padding: 18px; border-radius: 14px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <form class="card" method="post">
    {% csrf_token %}
    <h1>Vendor Panel Login</h1>
    <p>Sign in with your User account to continue.</p>

    {% if form.non_field_errors %}
      {{ form.non_field_errors }}
    {% endif %}

    <label for="id_username">Username</label>
    {{ form.username }}

    <label for="id_password">Password</label>
    {{ form.password }}

    <input type="hidden" name="next" value="{{ request.GET.next }}">
    <button type="submit">Login</button>
    <div class="hint">Successful login redirects to Vendor Panel.</div>
  </form>
</body>
</html>
